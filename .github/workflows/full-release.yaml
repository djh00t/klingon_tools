name: 🚀 Full Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine packaging build toml

      - name: Bump version & Generate Changelog
        id: semver
        uses: ietf-tools/semver-action@v1.11.0
        with:
          token: ${{ github.token }}
          branch: main
          minorList: "✨ feat, feat, feature"
          patchList: "🐛 fix, fix, 🐛 bug, bug, bugfix, perf, ♻️ refactor, refactor, 🚨 test, test, tests, 🔧 chore, chore"
          additionalCommits: "📚 doc, doc, 📚 docs, docs, 💄 style, style, 🚀 perf, perf, 🛠️ build, build, ⚙️ ci, ci, ⏪ revert, revert, other"
          noVersionBumpBehavior: patch

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.20.0
        with:
          tag: ${{ steps.semver.outputs.next }}
          name: Release ${{ steps.semver.outputs.next }}
          body: ${{ steps.semver.outputs.changelog }}
          token: ${{ github.token }}

      - name: Sync package version to release tag
        run: |
          RAW_VERSION="${{ steps.semver.outputs.next }}"
          PACKAGE_VERSION="${RAW_VERSION#v}"
          echo "Using package version: ${PACKAGE_VERSION}"
          sed -i -E "s/^version = \".*\"$/version = \"${PACKAGE_VERSION}\"/" pyproject.toml

      - name: Build and Verify Version
        run: |
          python -m build
          EXPECTED_VERSION="${{ steps.semver.outputs.next }}"
          EXPECTED_VERSION="${EXPECTED_VERSION#v}"
          ACTUAL_VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["tool"]["poetry"]["version"])')

          if [[ "$ACTUAL_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Version mismatch: expected $EXPECTED_VERSION but pyproject has $ACTUAL_VERSION"
            exit 1
          fi

          if ! ls dist/*"${EXPECTED_VERSION}"* >/dev/null 2>&1; then
            echo "Built artifacts do not include expected version $EXPECTED_VERSION"
            ls -la dist
            exit 1
          fi

      - name: Publish to TestPyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_USER_AGENT }}
        run: |
          for i in {1..5}; do
            twine upload --skip-existing --repository-url https://test.pypi.org/legacy/ dist/* && break || {
              echo "TestPyPI upload failed, retrying in 5 seconds..."
              sleep 5
            }
          done

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_USER_AGENT }}
        run: |
          for i in {1..5}; do
            twine upload --skip-existing dist/* && break || {
              echo "Upload failed, retrying in 5 seconds..."
              sleep 5
            }
          done
